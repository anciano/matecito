<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Matecito - AR</title>
    <link rel="stylesheet" href="../src/style.css" />
    <style>
        /* Ensure full screen for AR */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
        }

        #ar-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }

        #scanning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            z-index: 50;
        }

        #scanning-overlay.hidden {
            display: none;
        }
    </style>
    <!-- MindAR dependencies (Image tracking for Three.js) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
</head>

<body>
    <div id="app">
        <div id="scanning-overlay">
            <div style="text-align: center;">
                <p>Cargando escáner AR...</p>
            </div>
        </div>
        <div id="ar-ui"></div>
    </div>
    <script type="module" src="./main.ts"></script>
</body>

</html>
